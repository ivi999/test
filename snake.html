<!DOCTYPE html>
<html>
<head>
  <title>Змейка</title>
  <style>
    body { background: black; display: flex; justify-content: center; }
    canvas { border: 2px solid green; margin-top: 20px; }
  </style>
</head>
<body>
<canvas id="game" width="400" height="400"></canvas>
<script>
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');

  // Настройки игры
  const BLOCK = 20;
  const COLOR_SNAKE = 'lime';
  const COLOR_FOOD = 'red';
  const SPEED = 150;

  let snake = [{x: 200, y: 200}];
  let food = {x: 100, y: 100};
  let direction = {x: BLOCK, y: 0};
  let score = 0;

  document.addEventListener('keydown', e => {
    if (e.key === 'ArrowUp' && direction.y === 0)
      direction = {x: 0, y: -BLOCK};
    if (e.key === 'ArrowDown' && direction.y === 0)
      direction = {x: 0, y: BLOCK};
    if (e.key === 'ArrowLeft' && direction.x === 0)
      direction = {x: -BLOCK, y: 0};
    if (e.key === 'ArrowRight' && direction.x === 0)
      direction = {x: BLOCK, y: 0};
  });

  function randomFood() {
    return {
      x: Math.floor(Math.random() * 20) * BLOCK,
      y: Math.floor(Math.random() * 20) * BLOCK
    };
  }

  function draw() {
    // Очистить экран
    ctx.fillStyle = 'black';
    ctx.fillRect(0, 0, 400, 400);

    // Нарисовать змейку
    ctx.fillStyle = COLOR_SNAKE;
    snake.forEach(s => ctx.fillRect(s.x, s.y, BLOCK-2, BLOCK-2));

    // Нарисовать еду
    ctx.fillStyle = COLOR_FOOD;
    ctx.fillRect(food.x, food.y, BLOCK-2, BLOCK-2);

    // Счёт
    ctx.fillStyle = 'white';
    ctx.font = '16px Arial';
    ctx.fillText('Счёт: ' + score, 10, 20);
  }

  function update() {
    const head = {
      x: snake[0].x + direction.x,
      y: snake[0].y + direction.y
    };

    // Проверка столкновения со стеной
    if (head.x < 0 || head.x >= 400 || head.y < 0 || head.y >= 400) {
      alert('Игра окончена! Счёт: ' + score);
      snake = [{x: 200, y: 200}];
      direction = {x: BLOCK, y: 0};
      score = 0;
      return;
    }

    snake.unshift(head);

    // Съела еду?
    if (head.x === food.x && head.y === food.y) {
      score++;
      food = randomFood();
    } else {
      snake.pop();
    }
  }

  setInterval(() => {
    update();
    draw();
  }, SPEED);
</script>
</body>
</html>
